version: 2

models:
  - name: int_user_activity
    description: >
      Intermediate model that enriches staged user activity data.
      Generates unique event identifiers and ensures deduplication.
      Handles late-arriving data and prepares dataset for analytics.

    columns:
      - name: user_id
        description: Unique identifier of the user.
        tests:
          - not_null

      - name: event_type
        description: Type of user activity event.

      - name: duration
        description: Duration of the event in seconds.

      - name: event_time
        description: Timestamp when the event occurred.

      - name: user_event_id
        description: >
          Deterministic unique identifier for each event, generated using a hash
          of user_id, event_type, and event_time.
        tests:
          - not_null
          - unique